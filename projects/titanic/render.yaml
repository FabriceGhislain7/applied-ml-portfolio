services:
  - type: web
    name: titanic-streamlit-dashboard
    runtime: python
    plan: free
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: streamlit run app.py --server.headless true --server.port $PORT --browser.serverAddress 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DEBUG
        value: "False"
